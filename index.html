<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LobitoWolfX Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --font-family: 'Inter', sans-serif;
      --bg: #E0F7FA;
      --card-bg: #FFFFFF;
      --text: #37474F;
      --accent: #FF7043;
      --accent-hover: #F4511E;
      --timer-color: #0288D1;
      --success-bg: #66BB6A;
      --radius: 8px;
      --gap: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: var(--gap);
      font-family: var(--font-family);
      background: var(--bg);
      color: var(--text);
    }

    header {
      text-align: center;
      margin-bottom: var(--gap);
    }

    header h1 {
      margin: 0;
      font-weight: 600;
    }

    header img {
      width: 80px;
      margin-top: 8px;
    }

    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--gap);
      margin-bottom: var(--gap);
    }

    .nav button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .nav button:hover {
      background: var(--accent-hover);
    }

    #day-label {
      font-weight: 600;
    }

    .notification {
      display: none;
      text-align: center;
      background: var(--success-bg);
      color: #fff;
      padding: 10px;
      border-radius: var(--radius);
      margin-bottom: var(--gap);
    }

    .exercise-list {
      max-width: 800px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: var(--gap);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .category {
      margin-bottom: var(--gap);
    }

    .category h3 {
      margin-bottom: 8px;
      font-weight: 600;
    }

    .category-items {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--gap);
    }

    @media (min-width: 600px) {
      .category-items {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      }
    }

    .exercise {
      background: #FAFAFA;
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      transition: opacity 0.2s, background 0.2s;
      position: relative;
    }

    .exercise.completed {
      opacity: 0.6;
      text-decoration: line-through;
    }

    .exercise-header {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .exercise-header input[type='checkbox'] {
      margin-right: 8px;
      accent-color: var(--accent);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .exercise-header span {
      flex: 1;
    }

    .details {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .timer {
      color: var(--timer-color);
      font-weight: 500;
    }

    .timer-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 6px 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .timer-btn:hover {
      background: var(--accent-hover);
    }

    .total-time,
    .total-time-day {
      margin-top: var(--gap);
      font-weight: 600;
    }
  </style>
</head>

<body>
  <header>
    <h1>Lobito SkiEx Tracker</h1>
    <img src="ExWolf.png" alt="Logo" />
  </header>

  <div class="nav">
    <button id="prev-day">&larr; Prev</button>
    <span id="day-label"></span>
    <button id="next-day">Next &rarr;</button>
  </div>

  <div id="notification" class="notification"></div>
  <audio id="notification-sound" src="ding.mp3"></audio>

  <div class="exercise-list">
    <div id="exercise-container"></div>
  </div>

  <script>
    const exercises = {
      Monday: {
        WarmUp: [
          { name: "Jumping Jacks (1 min)", duration: 1 },
          { name: "Arm Circles (1 min)", duration: 1 },
          { name: "Leg Swings (1 min per leg)", duration: 1 },
          { name: "Downward Dog (1 min)", duration: 1 },
        ],
        Exercise: [
          { name: "Body weight Squats (3x10)", duration: 3 },
          { name: "Lunges (2x30)", duration: 3 },
          { name: "Glute Bridges (1 min)", duration: 1 },
          { name: "Wall Sit (30 seconds)", duration: 0.5 },
          { name: "Bicep Curls (3x10)", duration: 3 },
          { name: "Plank (30 seconds)", duration: 0.5 },
          { name: "Side Plank (30 seconds per side)", duration: 1 },
          { name: "Single Deadlifts (30 seconds per leg)", duration: 0.5 },
          { name: "Bird Dogs (30 per side)", duration: 1 },
          { name: "Push-ups (3x10)", duration: 3 },
          { name: "Triceps Dips (3x10)", duration: 3 },
          { name: "Dolphin Pose (1 min)", duration: 1 },
        ],
        CoolDown: [
          { name: "Hamstring stretch (1 min)", duration: 1 },
          { name: "Hip Flexor stretch (1 min)", duration: 1 },
          { name: "Quad stretch (1 min)", duration: 1 },
          { name: "Calf stretch (1 min)", duration: 1 },
          { name: "Child's Pose (1 min)", duration: 1 },
          { name: "Cat-Cow Stretch (1 min)", duration: 1 },
          { name: "Supine Spinal Twist (1 min per side)", duration: 2 },
          { name: "Sphinx Pose (1 min)", duration: 1 },
        ],
      },
      Tuesday: {
        WarmUp: [
          { name: "Light Cardio (5 min)", duration: 5 },
          { name: "Downward Dog (1 min)", duration: 1 },
        ],
        Exercise: [],
        CoolDown: [
          { name: "Hamstring stretch (1 min)", duration: 1 },
          { name: "Hip Flexor stretch (1 min)", duration: 1 },
          { name: "Quad stretch (1 min)", duration: 1 },
          { name: "Calf stretch (1 min)", duration: 1 },
          { name: "Child's Pose (1 min)", duration: 1 },
          { name: "Cat-Cow Stretch (1 min)", duration: 1 },
          { name: "Supine Spinal Twist (1 min per side)", duration: 2 },
          { name: "Sphinx Pose (1 min)", duration: 1 },
        ],
      },
      Wednesday: {
        WarmUp: [
          { name: "Jumping Jacks (1 min)", duration: 1 },
          { name: "Arm Circles (1 min)", duration: 1 },
          { name: "Leg Swings (1 min per leg)", duration: 1 },
          { name: "Downward Dog (1 min)", duration: 1 },
        ],
        Exercise: [
          { name: "Body weight Squats (3x10)", duration: 3 },
          { name: "Lunges (2x30)", duration: 3 },
          { name: "Glute Bridges (1 min)", duration: 1 },
          { name: "Wall Sit (30 seconds)", duration: 0.5 },
          { name: "Bicep Curls (3x10)", duration: 3 },
          { name: "Plank (30 seconds)", duration: 0.5 },
          { name: "Side Plank (30 seconds per side)", duration: 1 },
          { name: "Single Deadlifts (30 seconds per leg)", duration: 0.5 },
          { name: "Bird Dogs (30 per side)", duration: 1 },
          { name: "Dolphin Pose (1 min)", duration: 1 },
        ],
        CoolDown: [
          { name: "Hamstring stretch (1 min)", duration: 1 },
          { name: "Hip Flexor stretch (1 min)", duration: 1 },
          { name: "Quad stretch (1 min)", duration: 1 },
          { name: "Calf stretch (1 min)", duration: 1 },
          { name: "Child's Pose (1 min)", duration: 1 },
          { name: "Cat-Cow Stretch (1 min)", duration: 1 },
          { name: "Supine Spinal Twist (1 min per side)", duration: 2 },
          { name: "Sphinx Pose (1 min)", duration: 1 },
        ],
      },
      Thursday: {
        WarmUp: [
          { name: "Jumping Jacks (1 min)", duration: 1 },
          { name: "Arm Circles (1 min)", duration: 1 },
          { name: "Leg Swings (1 min per leg)", duration: 1 },
          { name: "Downward Dog (1 min)", duration: 1 },
        ],
        Exercise: [
          { name: "Jumping Squats (1 min)", duration: 1 },
          { name: "Lateral Skater Jumps (1 min)", duration: 1 },
          { name: "Mountain Climbers (1 min)", duration: 1 },
          { name: "Dolphin Pose (1 min)", duration: 1 },
        ],
        CoolDown: [
          { name: "Hamstring stretch (1 min)", duration: 1 },
          { name: "Hip Flexor stretch (1 min)", duration: 1 },
          { name: "Quad stretch (1 min)", duration: 1 },
          { name: "Calf stretch (1 min)", duration: 1 },
          { name: "Child's Pose (1 min)", duration: 1 },
          { name: "Cat-Cow Stretch (1 min)", duration: 1 },
          { name: "Supine Spinal Twist (1 min per side)", duration: 2 },
          { name: "Sphinx Pose (1 min)", duration: 1 },
        ],
      },
      Friday: {
        WarmUp: [
          { name: "Jumping Jacks (1 min)", duration: 1 },
          { name: "Arm Circles (1 min)", duration: 1 },
          { name: "Leg Swings (1 min per leg)", duration: 1 },
          { name: "Downward Dog (1 min)", duration: 1 },
        ],
        Exercise: [
          { name: "Body weight Squats (3x10)", duration: 3 },
          { name: "Lunges (2x30)", duration: 3 },
          { name: "Glute Bridges (1 min)", duration: 1 },
          { name: "Wall Sit (30 seconds)", duration: 0.5 },
          { name: "Bicep Curls (3x10)", duration: 3 },
          { name: "Plank (30 seconds)", duration: 0.5 },
          { name: "Side Plank (30 seconds per side)", duration: 1 },
          { name: "Single Deadlifts (30 seconds per leg)", duration: 0.5 },
          { name: "Bird Dogs (30 per side)", duration: 1 },
          { name: "Push-ups (3x10)", duration: 3 },
          { name: "Triceps Dips (3x10)", duration: 3 },
          { name: "Dolphin Pose (1 min)", duration: 1 },
        ],
        CoolDown: [
          { name: "Hamstring stretch (1 min)", duration: 1 },
          { name: "Hip Flexor stretch (1 min)", duration: 1 },
          { name: "Quad stretch (1 min)", duration: 1 },
          { name: "Calf stretch (1 min)", duration: 1 },
          { name: "Child's Pose (1 min)", duration: 1 },
          { name: "Cat-Cow Stretch (1 min)", duration: 1 },
          { name: "Supine Spinal Twist (1 min per side)", duration: 2 },
          { name: "Sphinx Pose (1 min)", duration: 1 },
        ],
      },
      Saturday: { WarmUp: [], Exercise: [], CoolDown: [] },
      Sunday:   { WarmUp: [], Exercise: [], CoolDown: [] }
    };

    const days = [
      'Sunday','Monday','Tuesday','Wednesday',
      'Thursday','Friday','Saturday'
    ];
    let idx = days.indexOf(
      new Date().toLocaleDateString('en-US', { weekday: 'long' })
    );

    const prevBtn = document.getElementById('prev-day');
    const nextBtn = document.getElementById('next-day');
    const dayLabel = document.getElementById('day-label');
    const container = document.getElementById('exercise-container');
    const notification = document.getElementById('notification');
    const ding = document.getElementById('notification-sound');

    prevBtn.addEventListener('click', () => {
      idx = (idx + 6) % 7;
      renderForDay(days[idx]);
    });

    nextBtn.addEventListener('click', () => {
      idx = (idx + 1) % 7;
      renderForDay(days[idx]);
    });

    function renderForDay(day) {
      dayLabel.textContent = `Routine for ${day}`;
      container.innerHTML = '';
      let totalTime = 0;

      const data = exercises[day] || {
        WarmUp: [{ name: "No warm-up.", duration: 0 }],
        Exercise: [{ name: "No exercise.", duration: 0 }],
        CoolDown: [{ name: "No cool-down.", duration: 0 }]
      };

      [['WarmUp','Warm-Up'],['Exercise','Exercise'],['CoolDown','Cool-Down']]
        .forEach(([key,title]) => {
          totalTime += renderCategory(title, data[key]);
        });

      const totalDiv = document.createElement('div');
      totalDiv.className = 'total-time-day';
      totalDiv.textContent = `Total time today: ${totalTime} minutes`;
      container.appendChild(totalDiv);
    }

    function renderCategory(title, list) {
      let sectionTime = 0;
      const cat = document.createElement('div');
      cat.className = 'category';

      const h3 = document.createElement('h3');
      h3.textContent = title;
      cat.appendChild(h3);

      const grid = document.createElement('div');
      grid.className = 'category-items';

      list.forEach(item => {
        sectionTime += item.duration;

        const card = document.createElement('div');
        card.className = 'exercise';

        // header with checkbox + name
        const header = document.createElement('div');
        header.className = 'exercise-header';
        const chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.addEventListener('change', () => {
          card.classList.toggle('completed', chk.checked);
        });
        const nameSpan = document.createElement('span');
        nameSpan.textContent = item.name;
        header.append(chk, nameSpan);

        // details with timer + button
        const details = document.createElement('div');
        details.className = 'details';
        const timerSpan = document.createElement('span');
        timerSpan.className = 'timer';
        timerSpan.textContent = `${item.duration}:00`;
        const btn = document.createElement('button');
        btn.className = 'timer-btn';
        btn.textContent = 'Start Timer';
        btn.addEventListener('click', () => {
          startTimer(item.name, timerSpan, item.duration * 60, btn);
        });

        details.append(timerSpan, btn);
        card.append(header, details);
        grid.appendChild(card);
      });

      cat.appendChild(grid);

      const totalSec = document.createElement('div');
      totalSec.className = 'total-time';
      totalSec.textContent = `Total time for ${title}: ${sectionTime} minutes`;
      cat.appendChild(totalSec);

      container.appendChild(cat);
      return sectionTime;
    }

    function startTimer(name, displayEl, duration, button) {
      let time = duration;
      button.disabled = true;
      const interval = setInterval(() => {
        const m = Math.floor(time / 60);
        const s = time % 60;
        displayEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
        time--;
        if (time < 0) {
          clearInterval(interval);
          displayEl.textContent = 'Done!';
          button.disabled = false;
          showNotification(`${name} completed!`);
        }
      }, 1000);
    }

    function showNotification(msg) {
      notification.textContent = msg;
      notification.style.display = 'block';
      ding.play();
      setTimeout(() => {
        notification.style.display = 'none';
      }, 3000);
    }

    // initial render
    renderForDay(days[idx]);
  </script>
</body>
</html>
