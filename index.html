<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LobitoWolfX Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"> 
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --font-family: 'Inter', sans-serif;
      --bg: #E0F7FA;
      --card-bg: #FFFFFF;
      --text: #37474F;
      --accent: #FF7043;
      --accent-hover: #F4511E;
      --timer-color: #0288D1;
      --success-bg: #66BB6A;
      --radius: 8px;
      --gap: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: var(--gap);
      font-family: var(--font-family);
      background: var(--bg);
      color: var(--text);
    }

    header {
      text-align: center;
      margin-bottom: var(--gap);
    }

    header h1 {
      margin: 0;
      font-weight: 600;
    }

    header img {
      width: 80px;
      margin-top: 8px;
    }

    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--gap);
      margin-bottom: var(--gap);
    }

    .nav button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    .nav button:hover {
      background: var(--accent-hover);
    }

    #day-label {
      font-weight: 600;
    }

    .notification {
      display: none;
      text-align: center;
      background: var(--success-bg);
      color: #fff;
      padding: 10px;
      border-radius: var(--radius);
      margin-bottom: var(--gap);
    }

    .exercise-list {
      max-width: 800px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: var(--gap);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .category {
      margin-bottom: var(--gap);
    }

    .category h3 {
      margin-bottom: 8px;
      font-weight: 600;
    }

    .category-items {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--gap);
    }

    @media (min-width: 600px) {
      .category-items {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      }
    }

    .exercise {
      background: #FAFAFA;
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      transition: opacity .2s, background .2s;
      position: relative;
    }

    .exercise.completed {
      opacity: 0.6;
      text-decoration: line-through;
    }

    .exercise-header {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .exercise-header input[type="checkbox"] {
      margin-right: 8px;
      accent-color: var(--accent);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .exercise-header span {
      flex: 1;
    }

    .details {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .timer {
      color: var(--timer-color);
      font-weight: 500;
    }

    .timer-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 6px 10px;
      cursor: pointer;
      transition: background .2s;
    }

    .timer-btn:hover {
      background: var(--accent-hover);
    }

    .total-time,
    .total-time-day {
      margin-top: var(--gap);
      font-weight: 600;
    }
  </style>
</head>

<body>
  <header>
    <h1>Lobito SkiEx Tracker</h1>
    <img src="ExWolf.png" alt="Logo">
  </header>

  <div class="nav">
    <button id="prev-day">&larr; Prev</button>
    <span id="day-label"></span>
    <button id="next-day">Next &rarr;</button>
  </div>

  <div id="notification" class="notification"></div>
  <audio id="notification-sound" src="ding.mp3"></audio>

  <div class="exercise-list">
    <div id="exercise-container"></div>
  </div>

  <script>
    const exercises = {
      Monday: { /* … your Monday data … */ },
      Tuesday: { /* … your Tuesday data … */ },
      Wednesday: { /* … */ },
      Thursday: { /* … */ },
      Friday: { /* … */ },
      Saturday: { WarmUp: [], Exercise: [], CoolDown: [] },
      Sunday:   { WarmUp: [], Exercise: [], CoolDown: [] }
    };

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    let idx = days.indexOf(new Date()
      .toLocaleDateString('en-US', { weekday: 'long' })
    );

    const prevBtn = document.getElementById('prev-day');
    const nextBtn = document.getElementById('next-day');
    const dayLabel = document.getElementById('day-label');
    const container = document.getElementById('exercise-container');

    prevBtn.addEventListener('click', () => {
      idx = (idx + 6) % 7;
      renderForDay(days[idx]);
    });

    nextBtn.addEventListener('click', () => {
      idx = (idx + 1) % 7;
      renderForDay(days[idx]);
    });

    function renderForDay(day) {
      dayLabel.textContent = `Routine for ${day}`;
      container.innerHTML = '';

      const data = exercises[day] || {
        WarmUp: [{ name: "No warm-up.", duration: 0 }],
        Exercise: [{ name: "No exercise.", duration: 0 }],
        CoolDown: [{ name: "No cool-down.", duration: 0 }]
      };

      let totalTime = 0;
      ['WarmUp','Exercise','CoolDown'].forEach(section => {
        const items = data[section] || [];
        const header = section === 'WarmUp' ? 'Warm-Up' :
                       section === 'CoolDown' ? 'Cool-Down' : 'Exercise';
        totalTime += renderCategory(header, items);
      });

      const totalDiv = document.createElement('div');
      totalDiv.className = 'total-time-day';
      totalDiv.textContent = `Total time today: ${totalTime} minutes`;
      container.appendChild(totalDiv);
    }

      let sectionTime = 0;
      const cat = document.createElement('div');
      cat.className = 'category';

      const h3 = document.createElement('h3');
      h3.textContent = title;
      cat.appendChild(h3);

      const grid = document.createElement('div');
      grid.className = 'category-items';

        sectionTime += item.duration;

        header.className = 'exercise-header';
        header.innerHTML = `

          <span>${item.name}</span>
