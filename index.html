<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lobito Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f1113;
      --card-bg: #1a1d21;
      --text-main: #e0e0e0;
      --text-dim: #909090;
      --accent: #ff4d4d; /* Strategic red accent */
      --accent-muted: #3d1a1a;
      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Inter', sans-serif;
      --radius: 12px;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    header h1 {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      font-style: italic;
      margin: 0;
      letter-spacing: -1px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 600px;
      margin: 0 auto 30px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .nav button {
      background: none;
      border: 1px solid #444;
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
    }

    .nav button:hover {
      background: var(--text-main);
      color: var(--bg);
    }

    #day-label {
      font-family: var(--font-serif);
      font-size: 1.4rem;
    }

    .exercise-list {
      max-width: 700px;
      margin: 0 auto;
    }

    .category h3 {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      color: var(--accent);
      margin-top: 40px;
      border-left: 3px solid var(--accent);
      padding-left: 15px;
    }

    .exercise {
      background: var(--card-bg);
      margin-bottom: 12px;
      padding: 20px;
      border-radius: var(--radius);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.2s;
    }

    .exercise.completed {
      opacity: 0.3;
      filter: grayscale(1);
    }

    .exercise-info h4 {
      margin: 0;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .exercise-info p {
      margin: 4px 0 0;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .timer-control {
      text-align: right;
    }

    .timer-display {
      display: block;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .timer-btn {
      background: var(--accent-muted);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }

    .total-summary {
      text-align: center;
      margin-top: 60px;
      color: var(--text-dim);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Notification */
    #notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--accent);
      color: white;
      padding: 15px 25px;
      border-radius: var(--radius);
      display: none;
      z-index: 100;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <header>
    <h1>Hot Lobito: The Project</h1>
    <img src="ExWolf.png" alt="Logo" />
    <p style="font-size: 0.8rem; letter-spacing: 3px; color: var(--text-dim);">1% Gym Rat 99% Hot Lesbian Energy</p>
  </header>

  <div class="nav">
    <button id="prev-day">Back</button>
    <span id="day-label"></span>
    <button id="next-day">Next</button>
  </div>

  <div id="notification"></div>

  <div class="exercise-list" id="exercise-container"></div>

  <script>
    // NEW INTEGRAL DATABASE
    const masterFullBody = [
      // --- THE FOUNDATION ---
      { name: "Goblet Squats", detail: "Barbell/Dumbbell - 3x12", duration: 3, cat: "Legs" },
      { name: "Overhead Press", detail: "Barbell (6kg) - 3x10", duration: 3, cat: "Shoulders/Arms" },
      { name: "Lateral Raises", detail: "Slow & Controlled - 3x12", duration: 3, cat: "Shoulders/Arms" },
      { name: "Push-ups", detail: "Chest Focus - 3x10", duration: 3, cat: "Upper Body" },
      // --- THE "OH DAMN" ARMS ---
      { name: "Bicep Curls", detail: "Dumbbells - 3x12", duration: 3, cat: "Shoulders/Arms" },
      { name: "Hammer Curls", detail: "Dumbbells (Neutral Grip) - 3x10", duration: 3, cat: "Shoulders/Arms" },
      { name: "Triceps Dips", detail: "Chair/Couch - 3x12", duration: 3, cat: "Shoulders/Arms" },  
      // --- THE ABS REVOLUTION ---
      { name: "Hollow Body Hold", detail: "Lower back glued to floor - 45 sec", duration: 1, cat: "Core" },
      { name: "Flutter Kicks", detail: "Hands under glutes - 1 min", duration: 1, cat: "Core" },
      { name: "Plank Shoulder Taps", detail: "Minimal hip rock - 1 min", duration: 1, cat: "Core" },
      { name: "Deadbugs", detail: "Slow & Controlled - 1 min", duration: 1, cat: "Core" }
    ];

    const warmUp = [
      { name: "Jumping Jacks", detail: "1 min", duration: 1 },
      { name: "Arm Circles", detail: "1 min", duration: 1 },
      { name: "Downward Dog", detail: "Stretch", duration: 1 }
    ];

    const coolDown = [
      { name: "Child's Pose", detail: "Relax", duration: 1 },
      { name: "Cat-Cow Stretch", detail: "Spine Mobility", duration: 1 },
      { name: "Cobra Stretch", detail: "Abs", duration: 1 }
    ];

    // AUTO-POPULATE LOGIC
    const exercises = {
      Monday: { WarmUp: warmUp, Exercise: masterFullBody, CoolDown: coolDown },
      Tuesday: { WarmUp: [{name: "Light Walk", detail: "Recovery", duration: 20}], Exercise: [], CoolDown: [] },
      Wednesday: { WarmUp: warmUp, Exercise: masterFullBody, CoolDown: coolDown },
      Thursday: { WarmUp: [{name: "Yoga/Stretch", detail: "Recovery", duration: 15}], Exercise: [], CoolDown: [] },
      Friday: { WarmUp: warmUp, Exercise: masterFullBody, CoolDown: coolDown },
      Saturday: { WarmUp: [], Exercise: [], CoolDown: [] },
      Sunday: { WarmUp: [], Exercise: [], CoolDown: [] }
    };

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    let idx = new Date().getDay();

    const container = document.getElementById('exercise-container');
    const dayLabel = document.getElementById('day-label');

    function render(dayName) {
      dayLabel.textContent = dayName;
      container.innerHTML = '';
      const data = exercises[dayName];

      const sections = [
        { title: "The Prep", key: "WarmUp" },
        { title: "The Work", key: "Exercise" },
        { title: "The Recovery", key: "CoolDown" }
      ];

      sections.forEach(s => {
        if (data[s.key].length > 0) {
          const sectionDiv = document.createElement('div');
          sectionDiv.className = 'category';
          sectionDiv.innerHTML = `<h3>${s.title}</h3>`;
          
          data[s.key].forEach(ex => {
            const card = document.createElement('div');
            card.className = 'exercise';
            card.innerHTML = `
              <div class="exercise-info">
                <h4>${ex.name}</h4>
                <p>${ex.detail}</p>
              </div>
              <div class="timer-control">
                <span class="timer-display" id="t-${ex.name.replace(/\s/g, '')}">${ex.duration}:00</span>
                <button class="timer-btn" onclick="runTimer('${ex.name}', ${ex.duration * 60}, this)">Start</button>
              </div>
            `;
            // Toggle completed on click of the card info
            card.addEventListener('click', (e) => {
              if(e.target.tagName !== 'BUTTON') card.classList.toggle('completed');
            });
            sectionDiv.appendChild(card);
          });
          container.appendChild(sectionDiv);
        }
      });
    }

    window.runTimer = function(name, seconds, btn) {
      btn.disabled = true;
      const display = document.getElementById(`t-${name.replace(/\s/g, '')}`);
      let timeLeft = seconds;

      const interval = setInterval(() => {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        display.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
        
        if (timeLeft <= 0) {
          clearInterval(interval);
          display.textContent = "Done";
          btn.disabled = false;
          showNotify(name + " Finished!");
        }
        timeLeft--;
      }, 1000);
    }

    function showNotify(msg) {
      const n = document.getElementById('notification');
      n.textContent = msg;
      n.style.display = 'block';
      setTimeout(() => n.style.display = 'none', 3000);
    }

    document.getElementById('prev-day').onclick = () => { idx = (idx + 6) % 7; render(days[idx]); };
    document.getElementById('next-day').onclick = () => { idx = (idx + 1) % 7; render(days[idx]); };

    render(days[idx]);
  </script>
</body>
</html>
